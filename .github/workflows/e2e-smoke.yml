name: e2e-smoke

# Fast, fully-offline Playwright smoke gate. The e2e suite never calls a real API
# (the apiGuard fixture enforces it), so this job needs NO secrets/tokens.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  smoke:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm
      - name: Install dependencies
        run: npm ci
      # chromium only — all 3 viewport projects are chromium-based.
      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium
      - name: Type-check the e2e layer
        run: npm run typecheck:e2e
      - name: Run @smoke (offline, no secrets)
        run: npm run test:e2e:smoke
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
