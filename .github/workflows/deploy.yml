# AutoGameAgent — CI + GitHub Pages Deploy
#
# Triggers on every push to main and manual dispatch.
# Pipeline: install → test → build → deploy
#
# vs ming's approach (critical improvements):
#   - Triggers on push (not just version tags) → real-time deploy
#   - Single build job, artifact reused by deploy (no double-build)
#   - Runs vitest tests (ming has zero test coverage in CI)
#   - Base path via env var (not custom webpack plugin)
#   - Simple 404.html copy (not sessionStorage redirect hack)
#   - Zero CDN dependencies (ming loads Vue/Router from CDN)
#
# Prerequisites (one-time repo settings):
#   1. Settings > Pages > Source > "GitHub Actions"
#   2. Settings > Actions > Workflow permissions > "Read and write"

name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # Job 1: Test + Build (runs on every push & PR)
  # ──────────────────────────────────────────────
  build:
    name: Test & Build
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: /${{ github.event.repository.name }}/
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

      # Type-check is informational until pre-existing errors are fixed.
      # TODO: remove `|| true` once all TS errors are resolved.
      - name: Type-check (non-blocking)
        run: npx vue-tsc --noEmit || true

      - name: Build
        run: npx vite build

      - name: Create SPA fallback (404.html)
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll processing
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  # ──────────────────────────────────────────────
  # Job 2: Deploy (only on main branch push)
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
